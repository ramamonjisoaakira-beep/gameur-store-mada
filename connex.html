<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamer Store - Login & Register</title>
  <link rel="stylesheet" href="connex.css">
  <style>
    #to-register, #to-login {
      cursor: pointer;
      text-decoration: underline;
      color: #00ffff;
      font-weight: bold;
      display: inline-block;
      padding: 5px;
    }
  </style>
</head>
<body>

  <header class="animate-drop">
    <div class="header-content">
      <div></div>
    </div>
  </header>

  <main class="container">
    <div id="login-block" class="info animate-fade">
      <div class="form-header">
        <h2>SECURE_LOGIN</h2>
        <div class="line"></div>
      </div>
      
      <form id="main-login-form" onsubmit="return false;">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="email@exemple.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        
        <div class="loli">
          <button type="submit" class="btn-submit">SE CONNECTER</button>
        </div>
        
        <p class="switch-form">Nouveau joueur ? <span id="to-register">Créer un compte</span></p>
      </form>
    </div>

    <div id="register-block" class="info animate-fade" style="display: none;">
      <div class="form-header">
        <h2>NEW_PLAYER_REGISTRATION</h2>
      </div>

      <form id="main-register-form" onsubmit="return false;">
        <div class="azert">
          <div class="input-group">
            <label>NOM</label>
            <input type="text" id="reg-nom" placeholder="Votre nom" required>
          </div>
          <div class="input-group">
            <label>PRÉNOM</label>
            <input type="text" id="reg-prenom" placeholder="Votre prénom" required>
          </div>
          <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <input type="email" id="reg-email" placeholder="exemple@mail.com" required>
          </div>
          <div class="input-group">
            <label>PASSWORD (8 CHARACTERS MIN.)</label>
            <input type="password" id="reg-password" placeholder="••••••••" minlength="8" required>
          </div>
          <div class="input-group">
            <label>MADAGASCAR PHONE</label>
            <input type="tel" id="reg-phone" placeholder="03XXXXXXXX" required>
          </div>
          <div class="input-group">
            <label>LIEN PROFIL FACEBOOK</label>
            <input type="text" id="reg-facebook" placeholder="https://facebook.com/..." required>
          </div>
          <div class="input-group">
            <label>ADRESSE EXACTE (VILLE / QUARTIER / LOT)</label>
            <input type="text" id="reg-adresse" placeholder="Ex: Antananarivo, Analakely..." required>
          </div>
        </div>

        <div class="radio-box">
          <span class="radio-neon">SÉLECTIONNEZ VOTRE OPTION :</span>
          <div class="radio-group">
            <label class="radio-container">
              <input type="radio" name="option" value="Joueur Solo" checked> Solo
            </label>
            <label class="radio-container">
              <input type="radio" name="option" value="Joueur Équipe"> En Équipe
            </label>
          </div>
        </div>

        <div class="loli">
          <button type="submit" class="btn-submit">S'INSCRIRE</button>
          <button type="reset" class="btn-submit" style="background: #555;">EFFACER</button>
        </div>

        <p class="switch-form">Déjà un compte ? <span id="to-login">Se connecter</span></p>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-bottom">
      <p>SYSTEM_READY // &copy; 2026 Gamer Store. Tous droits réservés.</p>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCp3YoJ3y4LUiKhaKwpYWaKrEQ6QBNzeIg",
      authDomain: "gameur-store-mada.firebaseapp.com",
      projectId: "gameur-store-mada",
      storageBucket: "gameur-store-mada.firebasestorage.app",
      messagingSenderId: "469078679688",
      appId: "1:469078679688:web:43619b15f7d3a08c78ff3d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // BASCULE ENTRE LES BLOCS
    const loginBlock = document.getElementById('login-block');
    const registerBlock = document.getElementById('register-block');
    const toRegisterLink = document.getElementById('to-register');
    const toLoginLink = document.getElementById('to-login');

    if (toRegisterLink) {
      toRegisterLink.addEventListener('click', () => {
        loginBlock.style.display = 'none';
        registerBlock.style.display = 'block';
      });
    }

    if (toLoginLink) {
      toLoginLink.addEventListener('click', () => {
        registerBlock.style.display = 'none';
        loginBlock.style.display = 'block';
      });
    }

    // FORMULAIRE DE CONNEXION (LOGIN)
    const loginForm = document.getElementById('main-login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
            alert("Connexion réussie !");
            window.location.href = "index.html";
          })
          .catch(error => { alert("Erreur de connexion : " + error.message); });
      });
    }

    // FORMULAIRE D'INSCRIPTION (REGISTER)
    const registerForm = document.getElementById('main-register-form');
    if (registerForm) {
      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const nom = document.getElementById('reg-nom').value;
        const prenom = document.getElementById('reg-prenom').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const phone = document.getElementById('reg-phone').value;
        const facebook = document.getElementById('reg-facebook').value;
        const adresse = document.getElementById('reg-adresse').value;
        
        const optionSelected = registerForm.querySelector('input[name="option"]:checked');
        const optionJoueur = optionSelected ? optionSelected.value : "Non spécifié";

        // Tentative d'inscription
        createUserWithEmailAndPassword(auth, email, password)
          .then((userCredential) => {
            const user = userCredential.user;
            // Sauvegarde des infos
            setDoc(doc(db, "utilisateurs", user.uid), {
              nom: nom, prenom: prenom, email: email, telephone: phone,
              facebook: facebook, adresse: adresse, option: optionJoueur,
              createdAt: new Date().toISOString()
            })
            .then(() => {
              alert("Inscription réussie ! Bienvenue !");
              window.location.href = "index.html";
            })
            .catch(err => { alert("Erreur base de données : " + err.message); });
          })
          .catch((error) => {
            // SI L'EMAIL EXISTE DÉJÀ, ON LE CONNECTE DIRECTEMENT !
            if (error.code === 'auth/email-already-in-use') {
              signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                  alert("Compte existant trouvé. Connexion automatique réussie !");
                  window.location.href = "index.html";
                })
                .catch(loginErr => {
                  alert("Cet e-mail existe déjà, mais le mot de passe entré est incorrect.");
                });
            } else {
              alert("Erreur d'inscription : " + error.message);
            }
          });
      });
    }
  </script>
</body>
</html>
