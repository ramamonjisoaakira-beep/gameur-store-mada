<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Store - Login & Register</title>
    <link rel="stylesheet" href="connex.css">
</head>
<body>

    <div class="login-container">
        <h2>SECURE_LOGIN</h2>
        <form>
            <label>EMAIL ADDRESS</label>
            <input type="email" placeholder="email@domain.com" required>
            
            <label>PASSWORD</label>
            <input type="password" placeholder="........" required>
            
            <button type="submit">START_SESSION</button>
        </form>
        <p>Nouveau joueur ? <a href="#">Créer un compte ici</a></p>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCp3YoJ3y4LUiKhaKwpYWaKrEQ6QBNzeIg",
    authDomain: "gameur-store-mada.firebaseapp.com",
    projectId: "gameur-store-mada",
    storageBucket: "gameur-store-mada.firebasestorage.app",
    messagingSenderId: "469078679688",
    appId: "1:469078679688:web:43619b15f7d3a08c78ff3d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const form = document.querySelector("form");
  if (form) {
    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const email = document.querySelector('input[type="email"]').value;
      const password = document.querySelector('input[type="password"]').value;

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Inscription réussie ! Bienvenue sur Gameur Store Mada.");
          window.location.href = "index.html";
        })
        .catch((error) => {
          alert("Erreur lors de l'inscription : " + error.message);
        });
    });
  }
</script>
</body>
</html>
